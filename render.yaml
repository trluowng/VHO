services:
  # Backend — FastAPI: /triage, /auth/*, /profile, /calendar, /cycle
  - type: web
    name: vho-yen-backend
    runtime: python
    rootDir: Yen/backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TRIAGE_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: TRIAGE_MODEL
        value: gpt-4o-mini
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      # requirements.txt pulls in sentence-transformers + faiss-cpu for the optional
      # conversation-recall feature (memory/embedder.py), which tries to download and
      # load BAAI/bge-m3 (~2GB) on first use. The free plan here is capped at 512MB RAM,
      # so that OOMs the process on literally every /triage call. embedder.py already
      # supports this off-switch (falls back to a lightweight hash vector) -- confirmed
      # live that /triage was 500ing on Render even for a trivial "hi" until this was set.
      - key: MEMORY_EMBED_MODEL
        value: "off"
    autoDeploy: true

  # Frontend — React + Vite static site
  - type: web
    name: vho-yen-frontend
    runtime: static
    rootDir: Yen/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Sau khi vho-yen-backend deploy xong, đổi thành
      # https://<vho-yen-backend-url>.onrender.com rồi redeploy
      # (Vite bake env var vào lúc build — KHÔNG có /triage ở cuối).
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
