tools:
  - name: clarify
    description: "Gửi một câu hỏi/làm rõ cho khách hàng của Bệnh viện Tim Hà Nội."
    parameters:
      type: object
      properties:
        question: {type: string, default: "", description: "Câu hỏi làm rõ dành cho khách hàng"}
        response_type: {type: string, enum: [text, yes_no, choice], default: "text", description: "Kiểu trả lời"}
        options: {type: array, default: [], items: {type: string}, description: "Các lựa chọn"}
      required: [question]

  - name: tra_gia
    description: "Tra cứu giá dịch vụ kỹ thuật/khám bệnh tại Bệnh viện Tim Hà Nội."
    parameters:
      type: object
      properties:
        query: {type: string, description: "BẮT BUỘC - tên dịch vụ/xét nghiệm/thủ thuật cần tra giá, ví dụ 'siêu âm tim' hoặc 'khám nội tim mạch'. Không được để trống."}
        max_results: {type: integer, default: 8, description: "Số kết quả tối đa trả về"}
      required: [query]

  - name: tra_cuu
    description: "Tra cứu quy trình hành chính, chính sách bệnh viện và Luật Khám bệnh, chữa bệnh 15/2023/QH15."
    parameters:
      type: object
      properties:
        query: {type: string, description: "BẮT BUỘC - nội dung cần tra cứu, ví dụ 'cách đặt lịch khám' hoặc 'quyền của người bệnh'. Không được để trống."}
        max_results: {type: integer, default: 3, description: "Số kết quả tối đa trả về"}
      required: [query]

  - name: xem_lich_kham
    description: "Tìm bác sĩ theo chuyên khoa và xem lịch khám còn trống. Chỉ gọi sau khi đã hỏi khách muốn khám ngày nào/khung giờ nào, hoặc khách nói rõ ngày giờ nào cũng được. Không tự đặt lịch."
    parameters:
      type: object
      properties:
        query: {type: string, description: "BẮT BUỘC - chuyên khoa cần tìm bác sĩ: 'Tim mạch', 'Nhi', 'Da liễu', hoặc 'Nội tổng quát'. Không được để trống."}
        preferred_date: {type: string, default: "", description: "Ngày khách muốn khám, định dạng YYYY-MM-DD. Để trống nếu khách chỉ nói khung giờ/buổi."}
        preferred_time_slot: {type: string, default: "", description: "Khung giờ khách muốn khám, định dạng HH:MM-HH:MM, ví dụ 08:00-09:00. Để trống nếu khách chỉ nói ngày."}
        preferred_time_period: {type: string, enum: ["", morning, afternoon], default: "", description: "Buổi khách muốn khám: morning cho buổi sáng, afternoon cho buổi chiều. Dùng khi khách nói 'sáng mai', 'chiều mai' nhưng chưa chọn slot cụ thể."}
        flexible_time: {type: boolean, default: false, description: "Chỉ set true khi khách nói rõ ngày/giờ nào cũng được hoặc muốn xem lịch gần nhất bất kỳ."}
        max_doctors: {type: integer, default: 3, description: "Số bác sĩ tối đa trả về"}
        max_slots_per_doctor: {type: integer, default: 3, description: "Số khung giờ trống tối đa mỗi bác sĩ"}
      required: [query]
